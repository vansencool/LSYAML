plugins {
    id 'java'
    id 'maven-publish'
}

group = 'net.vansencool'
version = '1.1.0'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.jetbrains:annotations:26.1.0'
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testImplementation 'org.yaml:snakeyaml:2.5'
    testImplementation 'com.github.oshi:oshi-core:6.9.3'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    testRuntimeOnly 'org.slf4j:slf4j-nop:2.0.17'
}

test {
    useJUnitPlatform()
}

task benchmark(type: JavaExec) {
    group = 'verification'
    description = 'Run LSYAML vs SnakeYAML benchmark'
    classpath = sourceSets.test.runtimeClasspath
    mainClass = 'net.vansencool.lsyaml.benchmark.ParserBenchmark'
    jvmArgs '--enable-native-access=ALL-UNNAMED'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
    withSourcesJar()
    withJavadocJar()
}

tasks.withType(JavaCompile).configureEach {
    options.release = 17
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
        }
    }

    repositories {
        maven {
            url = uri("https://repository.vansencool.net")

            credentials {
                username = "vansen"
                password = project.findProperty("repoPass") ?: System.getenv("REPO_PASS")
            }
        }
    }
}